
    <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ôio Social - Entrar</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#009c3b,#ffdf00);font-family:'Segoe UI',Arial;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .box{background:white;padding:40px;border-radius:20px;text-align:center;max-width:400px;width:90%}
        h1{color:#009c3b;margin:10px 0}
        input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px}
        button{width:100%;padding:12px;background:#009c3b;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
        .flag{font-size:50px}
        a{color:#009c3b}
        .msg{background:#ffeb3b;padding:10px;border-radius:8px;margin-bottom:15px}
    </style>
</head>
<body>
    <div class="box">
        <div class="flag">🇧🇷</div>
        <h1>Ôio Social</h1>
        <p>A rede social brasileira</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="msg">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Email ou apelido" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p style="margin-top:20px">Não tem conta? <a href="/cadastro">Criar conta</a></p>
        <p style="margin-top:10px;font-size:12px;color:#666">admin@oio.com / admin123</p>
    </div>
</body>
</html>
